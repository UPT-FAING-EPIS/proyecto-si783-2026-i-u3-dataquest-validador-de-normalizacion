name: Build & Deploy to Azure

on:
  workflow_run:
    workflows: ["Tests Suite", "Security Analysis"]
    types:
      - completed
    branches: [ "main", "Fabrizio-Perez" ]

permissions:
  contents: write
  packages: write
  id-token: write
  issues: write
  pull-requests: write

env:
  DOCKER_IMAGE: ghcr.io/upt-faing-epis/proyecto-si783-2026-i-u1-validador-de-normalizacion:latest

jobs:
  build-and-deploy:
    name: Build, Version and Deploy
    # Solo ejecuta si los tests y seguridad pasaron exitosamente
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release (Versioning)
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
          
      - name: Run Snyk Container Security
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.DOCKER_IMAGE }}
          args: --file=Dockerfile
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        
      - name: Rebuild Terraform State
        working-directory: ./terraform
        env:
          TF_VAR_docker_image: ${{ env.DOCKER_IMAGE }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_key: ${{ secrets.SUPABASE_KEY }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          terraform import azurerm_resource_group.rg /subscriptions/$SUB_ID/resourceGroups/rg-dataquest-prod || true
          terraform import azurerm_service_plan.asp /subscriptions/$SUB_ID/resourceGroups/rg-dataquest-prod/providers/Microsoft.Web/serverFarms/asp-dataquest-linux || true
          terraform import azurerm_linux_web_app.app /subscriptions/$SUB_ID/resourceGroups/rg-dataquest-prod/providers/Microsoft.Web/sites/app-dataquest-web || true
          terraform import azurerm_linux_web_app.api /subscriptions/$SUB_ID/resourceGroups/rg-dataquest-prod/providers/Microsoft.Web/sites/app-dataquest-web-api || true
      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_docker_image: ${{ env.DOCKER_IMAGE }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_key: ${{ secrets.SUPABASE_KEY }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
        run: terraform apply -auto-approve

      - name: Restart Azure Web Apps
        run: |
          az webapp restart --name app-dataquest-web --resource-group rg-dataquest-prod
          az webapp restart --name app-dataquest-web-api --resource-group rg-dataquest-prod
